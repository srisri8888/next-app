name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/srisri8888/next-app:latest \
            -t ghcr.io/srisri8888/next-app:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/srisri8888/next-app:latest
          docker push ghcr.io/srisri8888/next-app:${{ github.sha }}